<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generador de Código QR</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background: linear-gradient(
        rgba(0,59,142,.65),
        rgba(217,4,41,.65)
    ),
    url("sanLorenzo.jpg");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

.container{

    width:100%;
    max-width:500px;

    padding:35px;

    border-radius:20px;

    text-align:center;

    background:rgba(255,255,255,.20);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,.25);

    box-shadow:0 10px 25px rgba(0,0,0,.35);

    color:white;

    backdrop-filter: blur(15px);
   
    -webkit-backdrop-filter: blur(15px);
}

h1{

    color:white;

    margin-bottom:15px;
}

p{

     color:white;

    margin-bottom:25px;
}

input{

    width:100%;

    padding:15px;

    border:2px solid #003b8e;

    border-radius:10px;

    font-size:16px;

    margin-bottom:20px;

    outline:none;

    transition:.3s;
}

input:focus{

    border-color:#d90429;
}

.botones{

    display:flex;

    gap:15px;

    justify-content:center;

    flex-wrap:wrap;
}

button{

    background:#003b8e;

    color:white;

    border:none;

    padding:14px 25px;

    font-size:16px;

    border-radius:10px;

    cursor:pointer;

    transition:.3s;
}

button:disabled{

    opacity:0.5;

    cursor:not-allowed;
}

#qrcode{

    margin-top:30px;

    display:flex;

    justify-content:center;
}

#qrcode img{

    border:8px solid white;

    box-shadow:0 8px 20px rgba(0,0,0,.25);
}

@media(max-width:600px){

    .container{

        padding:20px;
    }

    h1{

        font-size:28px;
    }

    button{

        width:100%;
    }
}

</style>
<!-- Librería QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="container">

<h1>Generador de Código QR</h1>

<p>
Pegá el enlace del sitio web y generá tu código QR.
</p>

<input
type="text"
id="url"
placeholder="https://www.tusitio.com">

<div class="botones">

<button id="generar">
Generar QR
</button>

<button id="descargar" disabled>
Descargar PNG
</button>

</div>

<div id="qrcode"></div>

</div>
<script>
const generar = document.getElementById("generar");
const descargar = document.getElementById("descargar");
const qrDiv = document.getElementById("qrcode");

let qr;

generar.addEventListener("click", ()=>{

    const url = document.getElementById("url").value.trim();

    if(url===""){
        alert("Ingrese un enlace.");
        return;
    }

    let regex=/^(http|https):\/\/[^ "]+$/;

    if(!regex.test(url)){
        alert("Ingrese una URL válida.");
        return;
    }

    qrDiv.innerHTML="";

    qr=new QRCode(qrDiv,{
        text:url,
        width:250,
        height:250,
        colorDark:"#003b8e",
        colorLight:"#ffffff",
        correctLevel:QRCode.CorrectLevel.H
    });
    descargar.disabled = false;
});

descargar.addEventListener("click", ()=>{

    let img=qrDiv.querySelector("img");

    if(!img){

        alert("Primero genere un QR.");
        return;
    }

    let enlace=document.createElement("a");

    enlace.href=img.src;

    enlace.download="codigoQR.png";

    enlace.click();

});
    
</script>
</body>
</html>
