<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generador de Código QR</title>

<style>
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background-image: url("sanLorenzo.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    margin: 0;
}

.container{

    width: 100%;
    max-width: 500px;

    background: rgba(255,255,255,0.95);

    padding: 35px;

    border-radius: 20px;

    box-shadow: 0 10px 25px rgba(0,0,0,.3);

    text-align: center;
}

h1{

    color:#003b8e;

    margin-bottom:15px;
}

p{

    color:#444;

    margin-bottom:25px;
}

input{

    width:100%;

    padding:15px;

    border:2px solid #003b8e;

    border-radius:10px;

    font-size:16px;

    margin-bottom:20px;

    outline:none;

    transition:.3s;
}

input:focus{

    border-color:#d90429;
}

.botones{

    display:flex;

    gap:15px;

    justify-content:center;

    flex-wrap:wrap;
}

button{

    background:#003b8e;

    color:white;

    border:none;

    padding:14px 25px;

    font-size:16px;

    border-radius:10px;

    cursor:pointer;

    transition:.3s;
}

button:hover{

    background:#d90429;

    transform:scale(1.05);
}

#qrcode{

    margin-top:30px;

    display:flex;

    justify-content:center;
}

#qrcode img{

    border:8px solid white;

    box-shadow:0 8px 20px rgba(0,0,0,.25);
}

@media(max-width:600px){

    .container{

        padding:20px;
    }

    h1{

        font-size:28px;
    }

    button{

        width:100%;
    }
}

<!-- Librería QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>
<body>

<div class="container">

<h1>Generador de Código QR</h1>

<p>
Pegá el enlace del sitio web y generá tu código QR.
</p>

<input
type="text"
id="url"
placeholder="https://www.tusitio.com">

<div class="botones">

<button id="generar">
Generar QR
</button>

<button id="descargar">
Descargar PNG
</button>

</div>

<div id="qrcode"></div>

</div>

<script src="script.js"></script>

</body>
</html>
